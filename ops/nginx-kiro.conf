# Kiro 통합 랭킹 — nginx 리버스 프록시 (https → 127.0.0.1:3000).
# 배치 위치: /etc/nginx/sites-available/kiro
# 활성화:   sudo ln -s /etc/nginx/sites-available/kiro /etc/nginx/sites-enabled/kiro
# 적용:     sudo nginx -t && sudo systemctl reload nginx
#
# 최초 단계는 HTTP only — certbot --nginx 실행 시 SSL 블록 자동 추가됨.

server {
    listen 80;
    listen [::]:80;
    server_name kiro.tbit.co.kr;

    # certbot HTTP-01 chal 폴더 (certbot 가 자동으로 사용)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 헬스체크
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 비밀번호 재설정 토큰이 URL query string 에 들어가므로 access log 제외.
    # 토큰은 1시간 + 1회용이지만 운영자/백업/외부전송 시점에 노출되는 사고 방지.
    location /login/reset-password {
        access_log off;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # 모든 요청 → Next.js (Docker 컨테이너 127.0.0.1:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 헤더 전달 — Next.js / iron-session 이 IP, scheme 인식
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # HMR/WebSocket 호환 (운영엔 안 쓰지만 무해)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # 긴 요청 (이미지 생성, 인제스트 트리거 등) 대비
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # 큰 응답 버퍼링
        proxy_buffering on;
        proxy_buffers 16 32k;
        proxy_buffer_size 64k;
    }

    # 정적 자산 캐시 힌트 (Next.js 가 만든 immutable assets)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 업로드 크기 한도 (일반 form 요청 여유)
    client_max_body_size 5M;
}
