# Kiro 통합 랭킹 — nginx 리버스 프록시 (https → 127.0.0.1:3000).
# 배치 위치: /etc/nginx/sites-available/kiro
# 활성화:   sudo ln -s /etc/nginx/sites-available/kiro /etc/nginx/sites-enabled/kiro
# 적용:     sudo nginx -t && sudo systemctl reload nginx
#
# ⚠ 첫 배포 (인증서 없는 상태) 에는 그대로 cp 하면 nginx -t 실패.
#   첫 배포 절차:
#     1. 임시로 ssl_* 라인 + listen 443 + 두번째 server (80→443 redirect) 블록을 주석 처리
#     2. nginx reload (80 동작)
#     3. ops/setup-ssl.sh 실행 → certbot 이 자동으로 SSL 라인 추가
#     4. 운영 시작 후엔 git 의 이 파일을 그대로 cp 해도 SSL 보존 (certbot 가 추가한 것과 동일 라인)

server {
    server_name kiro.tbit.co.kr;

    # ── 보안 헤더 (모든 응답 — always 옵션으로 4xx/5xx 도 포함) ──────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: 일단 frame-ancestors 만 (clickjacking 방어). Next.js inline script 와 호환.
    # script-src 등 더 엄격하게 가려면 nonce 도입 필요 — v1.2 후보.
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # certbot HTTP-01 challenge 폴더 (certbot 가 자동 사용)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 헬스체크
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 비번 재설정 토큰이 URL query 에 들어가므로 access log 제외
    # (토큰 1시간 + 1회용이지만 운영자/백업/외부전송 시점 노출 방지)
    location /login/reset-password {
        access_log off;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # 모든 요청 → Next.js (Docker 컨테이너 127.0.0.1:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 헤더 전달 — Next.js / iron-session 이 IP, scheme 인식
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # HMR/WebSocket 호환 (운영엔 안 쓰지만 무해)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # 긴 요청 대비
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # 큰 응답 버퍼링
        proxy_buffering on;
        proxy_buffers 16 32k;
        proxy_buffer_size 64k;
    }

    # 정적 자산 캐시 힌트 (Next.js immutable assets)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 업로드 크기 한도 (일반 form 요청 여유)
    client_max_body_size 5M;

    # ── SSL (certbot 가 발급한 인증서) ───────────────────────────────────
    # 첫 배포 시 이 블록은 주석 처리 후 setup-ssl.sh 로 SSL 받음 (위 헤더 참조).
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/kiro.tbit.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kiro.tbit.co.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS 강제 redirect (certbot --redirect 가 추가하는 블록과 동일)
server {
    if ($host = kiro.tbit.co.kr) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name kiro.tbit.co.kr;
    return 404;
}
